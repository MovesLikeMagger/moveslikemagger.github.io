<header class="site-header">
  <div class="container">
    <nav class="nav">
      <a href="{{ '/' | relative_url }}" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="4" fill="#E86C5A"/>
          <path d="M7 8h10M7 12h10M7 16h6" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Maggie Trowbridge</span>
      </a>
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#blog">Blog</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <a href="#contact" class="btn btn-primary nav-cta">Get in touch</a>
    </nav>
  </div>
</header>

<script>
document.querySelector('.mobile-menu-toggle').addEventListener('click', function() {
  this.classList.toggle('active');
  document.querySelector('.nav-links').classList.toggle('open');
  document.querySelector('.nav-cta').classList.toggle('open');
});

// Scroll spy for active nav link
(function() {
  var sections = ['home', 'blog', 'about', 'contact'];
  var links = document.querySelectorAll('.nav-links a');
  window.addEventListener('scroll', function() {
    var scrollPos = window.scrollY + 100;
    sections.forEach(function(id) {
      var el = document.getElementById(id);
      if (el && el.offsetTop <= scrollPos && el.offsetTop + el.offsetHeight > scrollPos) {
        links.forEach(function(l) { l.classList.remove('active'); });
        var active = document.querySelector('.nav-links a[href="#' + id + '"]');
        if (active) active.classList.add('active');
      }
    });
  });
})();
</script>
